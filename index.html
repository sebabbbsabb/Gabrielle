<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gabrielle LeChupette</title>
    <style>
        /* CUEVA OSCURA */
        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden;
            background-color: #000;
            display: flex; justify-content: center; align-items: center;
        }

        /* HUECO PARA MIRAR DIBUJO */
        #mask {
            /* RECORTE: 1048x640 para que la linea blanca quede afuera */
            width: 1048px; 
            height: 640px; 
            overflow: hidden;
            position: relative;
            border: 2px solid #111;
            background-color: #000;
            /* IMPORTANTE: centrar el escalado */
            transform-origin: center center;
            flex-shrink: 0;
        }

        /* DIBUJO QUE SE MUEVE ATRAS */
        #sprite-layer {
            position: absolute;
            background-image: url('https://i.imgur.com/GN17nyJ.jpeg');
            background-repeat: no-repeat;
            background-size: 7350px 3852px; 
            width: 7350px;
            height: 3852px;
            image-rendering: crisp-edges;
            left: -1px; top: -1px;
            will-change: transform;
        }
    </style>
</head>
<body>

    <div id="mask">
        <div id="sprite-layer"></div>
    </div>

    <script>
        const mask = document.getElementById('mask');
        const layer = document.getElementById('sprite-layer');
        const TOTAL_FRAMES = 39;
        const COLS = 7;
        const FW = 1050; 
        const FH = 642; 

        /* 1. AJUSTE DE PANTALLA (Para que no se corte en vertical) */
        function ajustarEscala() {
            // Comparamos el ancho de la pantalla con el del visor (1050px)
            const escalaAncho = window.innerWidth / 1050;
            // Comparamos el alto disponible con el del visor (642px)
            const escalaAlto = window.innerHeight / 642;
            
            // Usamos la escala más chica para que entre todo el cuadro
            let escalaFinal = Math.min(escalaAncho, escalaAlto) * 0.98; 
            
            if (escalaFinal < 1) {
                mask.style.transform = `scale(${escalaFinal})`;
            } else {
                mask.style.transform = `scale(1)`;
            }
        }
        
        window.addEventListener('resize', ajustarEscala);
        window.addEventListener('orientationchange', ajustarEscala);
        ajustarEscala();

        /* 2. MOVIMIENTO */
        function moverGabi(clientX) {
            const percent = clientX / window.innerWidth;
            const frameIndex = Math.floor(percent * (TOTAL_FRAMES - 1));
            const col = frameIndex % COLS;
            const row = Math.floor(frameIndex / COLS);
            const x = col * FW;
            const y = row * FH;
            layer.style.transform = `translate(-${x}px, -${y}px)`;
        }

        window.addEventListener('mousemove', (e) => moverGabi(e.clientX));
        window.addEventListener('touchstart', (e) => moverGabi(e.touches[0].clientX), { passive: false });
        window.addEventListener('touchmove', (e) => {
            e.preventDefault(); 
            moverGabi(e.touches[0].clientX);
        }, { passive: false });

        /* [Tu beso ASCII aquí abajo] */
    </script>
</body>
</html>
